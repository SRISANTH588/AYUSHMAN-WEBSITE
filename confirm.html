<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Confirmed – Ayushman PhysioFIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d2d5e 0%, #1a4b8c 50%, #2e7dd1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      overflow: hidden;
      text-align: center;
    }

    /* Green success header */
    .card-header {
      background: linear-gradient(135deg, #1a7a4a, #28a745);
      padding: 40px 36px 32px;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      margin: 0 auto 16px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .card-header h1 { color: white; font-size: 1.4rem; font-weight: 800; }
    .card-header p  { color: rgba(255,255,255,0.8); font-size: 0.88rem; margin-top: 6px; }

    .card-body { padding: 32px 36px 40px; }

    /* Details box */
    .details {
      background: #f0f7ff;
      border: 1.5px solid #dce8f5;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 28px;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 0.88rem;
      padding: 7px 0;
      border-bottom: 1px solid #eef3f9;
      color: #1a2a3a;
      gap: 12px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: #6b7c93; flex-shrink: 0; }
    .detail-row span:last-child  { font-weight: 600; text-align: right; word-break: break-all; }

    .amount-row span:last-child { font-size: 1.1rem; font-weight: 800; color: #1a4b8c; }

    /* Info note */
    .info-note {
      background: #fff8e6;
      border: 1.5px solid #ffe0a0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.83rem;
      color: #7a5500;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: left;
    }

    /* Buttons */
    .btn-home {
      display: block;
      padding: 14px;
      background: linear-gradient(135deg, #1a4b8c, #2e7dd1);
      color: white;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 12px;
    }

    .btn-home:hover { opacity: 0.9; transform: translateY(-2px); }

    .btn-wa {
      display: block;
      padding: 14px;
      background: #25D366;
      color: white;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .btn-wa:hover { opacity: 0.9; }

    .payment-id {
      font-size: 0.72rem;
      color: #aab4c0;
      margin-top: 20px;
      word-break: break-all;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="success-icon">✅</div>
      <h1>Payment Successful!</h1>
      <p>You're enrolled in the Online Fitness Class</p>
    </div>

    <div class="card-body">
      <div class="details" id="detailsBox">
        <!-- Populated by JS -->
      </div>

      <div class="info-note">
        📞 Admin will contact you shortly to confirm your slot and share the class joining link.<br/>
        Keep this page or take a screenshot for your records.
      </div>

      <a href="index.html" class="btn-home">← Back to Home</a>
      <a id="waBtn" href="#" class="btn-wa" target="_blank">💬 Share on WhatsApp</a>

      <p class="payment-id" id="paymentIdLine"></p>
    </div>
  </div>

  <script>
    const params    = new URLSearchParams(window.location.search);
    const name      = params.get('name')      || '';
    const phone     = params.get('phone')     || '';
    const slot      = params.get('slot')      || '';
    const amount    = params.get('amount')    || '';
    const paymentId = params.get('paymentId') || '';

    // Fallback: read from localStorage if params missing
    const ls = JSON.parse(localStorage.getItem('ayushman_enrollment') || '{}');
    const n  = name      || ls.name      || '—';
    const ph = phone     || ls.phone     || '—';
    const sl = slot      || ls.slot      || '—';
    const am = amount    || ls.amount    || '—';
    const pid = paymentId || ls.paymentId || '—';

    document.getElementById('detailsBox').innerHTML = `
      <div class="detail-row"><span>Name</span><span>${n}</span></div>
      <div class="detail-row"><span>Phone</span><span>${ph}</span></div>
      <div class="detail-row"><span>Enrolled Slot</span><span>${sl}</span></div>
      <div class="detail-row amount-row"><span>Amount Paid</span><span>₹${am}</span></div>
    `;

    document.getElementById('paymentIdLine').textContent = pid ? 'Payment ID: ' + pid : '';

    // WhatsApp share
    const waMsg =
`✅ *Payment Confirmed – Ayushman PhysioFIT*

I have successfully enrolled in the Online Fitness Class!

👤 Name: ${n}
📱 Phone: ${ph}
🏋️ Slot: ${sl}
💰 Amount Paid: ₹${am}

🏥 Ayushman PhysioFIT Rehabilitation Centre
📞 6302478412`;

    document.getElementById('waBtn').href =
      'https://wa.me/?text=' + encodeURIComponent(waMsg);
  </script>

</body>
</html>
