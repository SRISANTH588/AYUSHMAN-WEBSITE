<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neurology Conditions – Ayushman PhysioFIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .service-img-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 60px;
    }
    .service-img-card {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(26,75,140,0.15);
      border: 2px solid #dce8f5;
      background: #fff;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    }
    .service-img-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 48px rgba(26,75,140,0.25);
    }
    .service-img-card img {
      width: 100%;
      height: auto;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }
    @media (max-width: 900px) {
      .service-img-grid {
        grid-template-columns: repeat(4, 1fr);
        padding: 32px 16px;
        gap: 16px;
      }
    }
    @media (max-width: 480px) {
      .service-img-grid {
        grid-template-columns: repeat(4, 1fr);
        padding: 20px 12px;
        gap: 12px;
      }
      .service-img-card { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="images/logo_transparent.png" alt="Ayushman PhysioFIT" class="nav-logo"/>
      <div class="nav-brand-text"><span class="nav-name">Ayushman PhysioFIT</span><span class="nav-sub">Rehabilitation Centre · Vijayawada</span></div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="doctors.html">Doctors</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-hero">
    <h1>Neurology Conditions</h1>
    <p>Specialised physiotherapy for neurological disorders and recovery</p>
  </div>

  <section style="background:#f4f8fc;">
    <div class="service-img-grid">
      <div class="service-img-card"><img src="images/stroke.jpeg" alt="Stroke"/></div>
      <div class="service-img-card"><img src="images/bells.jpeg" alt="Bells Palsy"/></div>
      <div class="service-img-card"><img src="images/nerve.jpeg" alt="Nerve Injuries"/></div>
      <div class="service-img-card"><img src="images/parkinsons.jpeg" alt="Parkinson's Disease"/></div>
      <div class="service-img-card"><img src="images/sciatica.jpeg" alt="Sciatica"/></div>
      <div class="service-img-card"><img src="images/radiculopathy.jpeg" alt="Radiculopathy"/></div>
      <div class="service-img-card"><img src="images/cognitive.jpeg" alt="Cognitive Therapy"/></div>
      <div class="service-img-card"><img src="images/cerebral.jpeg" alt="Cerebral Palsy"/></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-bottom">© 2026 Ayushman PhysioFIT Rehabilitation Centre. All rights reserved.</div>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
  </script>
</body>
</html>
